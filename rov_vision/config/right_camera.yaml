camera_name: right_camera
camera_matrix:
  rows: 3
  cols: 3
  data: [424.102, 0.0, 427.677,
         0.0, 425.608, 240.242,
         0.0, 0.0, 1.0]
distortion_model: plumb_bob
distortion_coefficients:
  rows: 1
  cols: 5
